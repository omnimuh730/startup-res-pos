name: PR Check

on:
  pull_request:
    branches:
      - master
      - main
      - develop
      - staging
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect package manager
        id: pm
        shell: bash
        run: |
          if [[ -f "pnpm-lock.yaml" ]]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "run=pnpm run" >> "$GITHUB_OUTPUT"
          elif [[ -f "yarn.lock" ]]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "install=yarn install --immutable" >> "$GITHUB_OUTPUT"
            echo "run=yarn" >> "$GITHUB_OUTPUT"
          elif [[ -f "bun.lock" || -f "bun.lockb" ]]; then
            echo "manager=bun" >> "$GITHUB_OUTPUT"
            echo "install=bun install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "run=bun run" >> "$GITHUB_OUTPUT"
          elif [[ -f "package-lock.json" ]]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
            echo "run=npm run" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No supported lockfile found (pnpm/yarn/bun/npm)."
            exit 1
          fi

      - name: Set up pnpm
        if: ${{ steps.pm.outputs.manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up bun
        if: ${{ steps.pm.outputs.manager == 'bun' }}
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ steps.pm.outputs.manager == 'bun' && 'npm' || steps.pm.outputs.manager }}
          # Covers root + nested lockfiles in monorepos.
          cache-dependency-path: |
            **/pnpm-lock.yaml
            **/yarn.lock
            **/package-lock.json

      - name: Install dependencies
        shell: bash
        run: ${{ steps.pm.outputs.install }}

      - name: Detect available scripts
        id: scripts
        shell: bash
        run: |
          check_script() {
            node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['$1'] ? 0 : 1)"
          }

          for script in lint typecheck test build; do
            if check_script "$script"; then
              echo "${script}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${script}=false" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Lint
        if: ${{ steps.scripts.outputs.lint == 'true' }}
        shell: bash
        run: ${{ steps.pm.outputs.run }} lint

      - name: Typecheck
        if: ${{ steps.scripts.outputs.typecheck == 'true' }}
        shell: bash
        run: ${{ steps.pm.outputs.run }} typecheck

      - name: Test
        if: ${{ steps.scripts.outputs.test == 'true' }}
        shell: bash
        run: ${{ steps.pm.outputs.run }} test

      - name: Build
        if: ${{ steps.scripts.outputs.build == 'true' }}
        shell: bash
        run: ${{ steps.pm.outputs.run }} build

      - name: No-op notice for missing scripts
        if: ${{ steps.scripts.outputs.lint != 'true' && steps.scripts.outputs.typecheck != 'true' && steps.scripts.outputs.test != 'true' && steps.scripts.outputs.build != 'true' }}
        run: echo "No lint/typecheck/test/build scripts found in root package.json."
