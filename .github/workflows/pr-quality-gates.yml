name: PR Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  workflow_dispatch:

concurrency:
  group: pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-conventions:
    name: PR Conventions
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ -z "$BRANCH_NAME" ]]; then
            echo "This check only applies to pull requests."
            exit 0
          fi

          BRANCH_REGEX='^(feat|fix|chore|docs|refactor|test|ci|build|perf|revert|hotfix)\/[a-z0-9]+(-[a-z0-9]+)*$'
          if [[ ! "$BRANCH_NAME" =~ $BRANCH_REGEX ]]; then
            echo "::error::Invalid branch name '$BRANCH_NAME'."
            echo "Expected pattern: <type>/<kebab-case-description>"
            echo "Example: feat/checkout-summary-card"
            exit 1
          fi

      - name: Validate pull request title
        shell: bash
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          TITLE_REGEX='^(feat|fix|chore|docs|refactor|test|ci|build|perf|revert|hotfix)(\([a-z0-9._/-]+\))?!?: .{10,}$'
          if [[ ! "$PR_TITLE" =~ $TITLE_REGEX ]]; then
            echo "::error::Invalid PR title '$PR_TITLE'."
            echo "Use Conventional Commits format, e.g.:"
            echo "  feat(pos-app): add payment method selector"
            exit 1
          fi

  quality-checks:
    name: Lint Typecheck Build
    runs-on: ubuntu-latest
    needs: pr-conventions
    if: ${{ github.event.pull_request.draft == false }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
