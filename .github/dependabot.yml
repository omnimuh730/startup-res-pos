version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    # For very large monorepos, you can add grouped updates to reduce PR volume.
    # groups:
    #   tooling:
    #     patterns:
    #       - "eslint*"
    #       - "typescript"
