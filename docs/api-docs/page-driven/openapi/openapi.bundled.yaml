            - apns
            - web_push
        token:
          type: string
        platform:
          type: string
          enum:
            - ios
            - android
            - web
        appVersion:
          type: string
        deviceId:
          type: string
        isActive:
          type: boolean
        lastSeenAt:
          type: string
          format: date-time
    SavedItem:
      type: object
