                          $ref: '#/components/schemas/SubscriptionInvoice'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    customerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT issued by `/auth/customer/sign-in` or `/auth/refresh`.
        Required claims: `sub` (customer userId), `subjectKind="customer"`, `exp`.
    staffAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT issued by `/auth/staff/sign-in` or `/auth/refresh`.
        Required claims: `sub` (staff userId), `subjectKind="staff"`, `restaurantId`,
        `role` (`manager`/`waiter`/`chef`/`cashier`), `permissions[]`, `exp`.
        POS endpoints under `/pos/restaurants/{restaurantId}/...` enforce that the
        token's `restaurantId` claim equals the path parameter.
    publicAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Optional bearer token. Endpoints accepting `publicAuth` work anonymously and
        also personalize results when a `customerAuth` token is supplied.
  parameters:
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 128
      description: |
        Client-generated key for safely retrying mutations. Replays return the
        original response with `Idempotency-Replay: true`. Keys live 24h.
    CatalogPath:
      name: catalog
      in: path
      required: true
      schema:
        type: string
        enum:
          - security_questions
          - subscription_plans
          - reward_tiers
          - amenities
          - reservation_preferences
          - support_articles
          - occasions
          - feature_flags
    AcceptLanguageHeader:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
    DeviceIdPath:
      name: deviceId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    MethodIdPath:
      name: methodId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    CursorQuery:
      name: cursor
      in: query
      schema:
        type: string
        minLength: 1
      description: Opaque cursor returned by a previous response's `nextCursor`.
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SavedItemIdPath:
      name: savedItemId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    FriendIdPath:
      name: friendId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    FriendRequestIdPath:
      name: requestId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    FromDateQuery:
      name: from
      in: query
      schema:
        type: string
        format: date-time
    ToDateQuery:
      name: to
      in: query
      schema:
        type: string
        format: date-time
    PoolPath:
      name: pool
      in: path
      required: true
      schema:
        type: string
        enum:
          - domestic
          - foreign
          - bonus
    TopUpIdPath:
      name: topUpId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    NotificationIdPath:
      name: notificationId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    ConversationIdPath:
      name: conversationId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    PageQuery:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeQuery:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    RestaurantIdPath:
      name: restaurantId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
      description: Tenant restaurant id. Must equal the staff token's `restaurantId` claim.
    ReservationIdPath:
      name: reservationId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    InviteIdPath:
      name: inviteId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    InviteTokenPath:
      name: inviteToken
      in: path
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    PhoneIdPath:
      name: phoneId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    CardIdPath:
      name: cardId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    StaffIdPath:
      name: staffId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    PendingRequestIdPath:
      name: requestId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    FloorIdPath:
      name: floorId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    CategoryIdPath:
      name: categoryId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    SubcategoryIdPath:
      name: subcategoryId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    ItemIdPath:
      name: itemId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    ModifierIdPath:
      name: modifierId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    TableIdPath:
      name: tableId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    OrderIdPath:
      name: orderId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    BatchIdPath:
      name: batchId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    PaymentIdPath:
      name: paymentId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
  schemas:
    SignUpSecurityAnswer:
      type: object
      required:
        - questionId
        - answer
      properties:
        questionId:
          type: string
          description: metadata.security_questions.items[].code
        answer:
          type: string
          minLength: 1
          maxLength: 256
    AuthTokens:
      type: object
      required:
        - accessToken
        - refreshToken
        - accessTokenExpiresAt
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshTokenExpiresAt:
          type: string
          format: date-time
        tokenType:
          type: string
          enum:
            - Bearer
          default: Bearer
    ObjectId:
      type: string
      pattern: ^[0-9a-fA-F]{24}$
      example: 65f0000000000000000c0001
    Money:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          description: Decimal string preserving `Decimal128` precision (e.g. "60000", "32.00").
          pattern: ^-?[0-9]+(\.[0-9]+)?$
          example: '60000'
        currency:
          type: string
          description: ISO-4217 currency code. Common values KRW (zero minor units) and USD (two).
          example: KRW
          minLength: 3
          maxLength: 8
    UserWallets:
      type: object
      required:
        - domestic
        - foreign
        - bonus
      properties:
        domestic:
          type: object
          required:
            - currency
            - balance
          properties:
            currency:
              type: string
              example: KRW
            balance:
              $ref: '#/components/schemas/Money'
            defaultPaymentMethodId:
              $ref: '#/components/schemas/ObjectId'
        foreign:
          type: object
          required:
            - currency
            - balance
          properties:
            currency:
              type: string
              example: USD
            balance:
              $ref: '#/components/schemas/Money'
            defaultPaymentMethodId:
              $ref: '#/components/schemas/ObjectId'
        bonus:
          type: object
          required:
            - currency
            - balance
          properties:
            currency:
              type: string
              example: USD
            balance:
              $ref: '#/components/schemas/Money'
            expiresAt:
              type:
                - string
                - 'null'
              format: date-time
    UserRewards:
      type: object
      required:
        - tier
        - points
      properties:
        tier:
          type: string
          enum:
            - silver
            - gold
            - platinum
            - diamond
        points:
          type: integer
          minimum: 0
        nextTier:
          type:
            - string
            - 'null'
          enum:
            - gold
            - platinum
            - diamond
            - null
        pointsToNextTier:
          type: integer
          minimum: 0
    PaymentMethod:
      type: object
      required:
        - id
        - pspProvider
        - kind
        - isDefault
        - fundsForeign
        - fundsDomestic
        - addedAt
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        pspProvider:
          type: string
          example: stripe
        pspExternalId:
          type: string
        kind:
          type: string
          enum:
            - card
            - apple_pay
            - google_pay
            - paypal
            - bank_account
        card:
          type: object
          properties:
            brand:
              type: string
              example: Visa
            last4:
              type: string
              pattern: ^[0-9]{4}$
            expMonth:
              type: integer
              minimum: 1
              maximum: 12
            expYear:
              type: integer
              minimum: 2000
        bank:
          type: object
          properties:
            bankName:
              type: string
            last4:
              type: string
              pattern: ^[0-9]{4}$
        isDefault:
          type: boolean
        fundsForeign:
          type: boolean
        fundsDomestic:
          type: boolean
        addedAt:
          type: string
          format: date-time
    Device:
      type: object
      required:
        - id
        - provider
        - token
        - platform
        - isActive
        - lastSeenAt
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        provider:
          type: string
          enum:
