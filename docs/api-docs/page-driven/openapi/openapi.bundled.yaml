        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Subscription is not pending cancellation.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /pos/restaurants/{restaurantId}/subscription/invoices:
    get:
      tags:
        - POS · Subscriptions
      operationId: posListRestaurantInvoices
      summary: List embedded subscription invoices.
      description: Reads `subscriptions.invoices[]`; supports paging because the array can grow large over years.
      security:
