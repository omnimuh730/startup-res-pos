      summary: List wallet transactions (cursor pagination).
      parameters:
        - name: pool
          in: query
          schema:
            type: string
            enum:
              - domestic
              - foreign
              - bonus
              - all
            default: all
        - name: type
          in: query
          schema:
            type: string
            enum:
              - top_up
              - top_up_bonus
              - restaurant_payment
              - reward_earned
              - referral_bonus
              - gift_sent
              - gift_received
              - birthday_bonus
              - daily_bonus
              - refund
              - subscription_charge
              - adjustment
              - all
            default: all
        - name: direction
          in: query
          schema:
            type: string
            enum:
              - credit
              - debit
              - all
            default: all
        - $ref: '#/components/parameters/FromDateQuery'
        - $ref: '#/components/parameters/ToDateQuery'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Wallet transactions.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/WalletTransaction'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /me/wallets/{pool}/top-up:
    post:
      tags:
        - Customer · Wallets
      operationId: startTopUp
      summary: Start a wallet top-up. Returns a PSP intent for client confirmation.
      description: |
        Creates a `payments` document with `purpose=wallet_top_up` in `processing` and a
        matching draft `wallet_transactions` row that is committed only when the PSP webhook
        fires (or when `:confirm` is called for SDK-driven providers).

        `pool=bonus` is reserved for system-issued credits and rejected.
      parameters:
        - $ref: '#/components/parameters/PoolPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - paymentMethodId
              properties:
                amount:
                  $ref: '#/components/schemas/Money'
                paymentMethodId:
                  $ref: '#/components/schemas/ObjectId'
                promoCode:
                  type: string
                  description: Optional code that may grant `top_up_bonus`.
            examples:
              krwTopUp:
                value:
                  amount:
                    amount: '50000'
                    currency: KRW
                  paymentMethodId: 65f0000000000000000a0001
      responses:
        '201':
          description: Top-up started; finish in client SDK using `clientSecret`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  topUpId:
                    $ref: '#/components/schemas/ObjectId'
                  intent:
                    $ref: '#/components/schemas/PaymentIntentResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: Payment method not found or disabled.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Invalid pool, amount, or currency.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                poolBonus:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Invalid pool
                    status: 422
                    code: wallet_pool_disabled
                    detail: bonus pool is system-issued only
                tooSmall:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Amount too small
                    status: 422
                    code: top_up_amount_below_minimum
                    detail: minimum is 1000 KRW
                currency:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Currency mismatch
                    status: 422
                    code: currency_mismatch
                    detail: pool is KRW; amount currency must be KRW
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /me/wallets/top-ups/{topUpId}:
    get:
      tags:
        - Customer · Wallets
      operationId: getTopUp
      summary: Read a top-up's status (poll until succeeded/failed).
      parameters:
        - $ref: '#/components/parameters/TopUpIdPath'
      responses:
        '200':
          description: Top-up status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  topUpId:
                    $ref: '#/components/schemas/ObjectId'
                  status:
                    type: string
                    enum:
                      - requires_payment
                      - processing
                      - succeeded
                      - failed
                      - cancelled
                  walletTransactionId:
                    $ref: '#/components/schemas/ObjectId'
                  paymentId:
                    $ref: '#/components/schemas/ObjectId'
                  failure:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/wallets/top-ups/{topUpId}:cancel:
    post:
      tags:
        - Customer · Wallets
      operationId: cancelTopUp
      summary: Cancel a top-up still in `requires_payment` or `processing`.
      parameters:
        - $ref: '#/components/parameters/TopUpIdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Top-up already settled.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /me/wallets/{pool}/gift:
    post:
      tags:
        - Customer · Wallets
      operationId: sendGift
      summary: Gift wallet balance to another customer.
      description: |
        Atomic across two ledger entries (`gift_sent` debit + `gift_received` credit).
        The `bonus` pool is non-giftable: `403 bonus_not_giftable`.
      parameters:
        - $ref: '#/components/parameters/PoolPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - recipient
                - amount
              properties:
                recipient:
                  type: object
                  description: One of `username`, `userId`, or `phone`.
                  properties:
                    username:
                      type: string
                    userId:
                      $ref: '#/components/schemas/ObjectId'
                    phone:
                      type: string
                amount:
                  $ref: '#/components/schemas/Money'
                message:
                  type: string
                  maxLength: 200
      responses:
        '201':
          description: Gift sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  giftId:
                    $ref: '#/components/schemas/ObjectId'
                  senderTransactionId:
                    $ref: '#/components/schemas/ObjectId'
                  recipientTransactionId:
                    $ref: '#/components/schemas/ObjectId'
                  balanceAfter:
                    $ref: '#/components/schemas/Money'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          description: bonus pool is non-giftable.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                bonus:
                  value:
                    type: https://errors.catchtable.example/forbidden
                    title: Forbidden
                    status: 403
                    code: bonus_not_giftable
        '404':
          description: Recipient not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Cannot gift to self.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                self:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Conflict
                    status: 409
                    code: gift_self_not_allowed
        '422':
          description: Insufficient balance, currency mismatch, etc.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                insufficient:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Insufficient balance
                    status: 422
                    code: wallet_insufficient_balance
                currency:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Currency mismatch
                    status: 422
                    code: currency_mismatch
  /me/rewards:
    get:
      tags:
