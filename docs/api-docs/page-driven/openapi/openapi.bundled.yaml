          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /pos/orders/{orderId}/payments:
    post:
      tags:
        - POS · Orders
      operationId: posPayOrder
      summary: Capture payment for the bill (cash, credit, wallet, or mix).
      description: |
        Three method shapes (mirrors the page-driven Payment screens):

        **Cash** — `tendered` ≥ `bill.total`. Server returns `change`.
        **Credit** — Charges via PSP. Returns the captured `payment`. Failed PSP attempts
        return `422 payment_failed` with a `psp` failure code.
        **Wallet** — Debits the customer wallet (auto-routed by `pool` matching
        `bill.total.currency`). Returns `422 wallet_insufficient_balance` if too low.
        **Mix** — Array of partial methods; the sum must equal `bill.total`.

        Idempotent on `Idempotency-Key`. Replays return the original payment.
      security:
        - staffAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: cash
                  type: object
                  required:
                    - method
                    - tendered
                  properties:
                    method:
                      const: cash
                    tendered:
                      $ref: '#/components/schemas/Money'
                - title: credit
                  type: object
                  required:
                    - method
                    - depositCardId
                  properties:
                    method:
                      const: credit
                    depositCardId:
                      $ref: '#/components/schemas/ObjectId'
                    customerUserId:
                      $ref: '#/components/schemas/ObjectId'
                      description: Required if charging the customer's saved card via QR.
                    customerPaymentMethodId:
                      $ref: '#/components/schemas/ObjectId'
                - title: wallet
                  type: object
                  required:
                    - method
                    - customerUserId
                  properties:
                    method:
                      const: wallet
                    customerUserId:
                      $ref: '#/components/schemas/ObjectId'
                    pool:
                      type: string
                      enum:
                        - domestic
                        - foreign
                        - bonus
                - title: mix
                  type: object
                  required:
                    - method
                    - parts
                  properties:
                    method:
                      const: mix
                    parts:
                      type: array
                      minItems: 2
                      items:
                        type: object
                        required:
                          - method
                          - amount
                        properties:
                          method:
                            type: string
                            enum:
                              - cash
                              - credit
                              - wallet
                          amount:
                            $ref: '#/components/schemas/Money'
                          depositCardId:
                            $ref: '#/components/schemas/ObjectId'
                          customerUserId:
                            $ref: '#/components/schemas/ObjectId'
                          customerPaymentMethodId:
                            $ref: '#/components/schemas/ObjectId'
                          pool:
                            type: string
                            enum:
                              - domestic
                              - foreign
                              - bonus
                          tendered:
                            $ref: '#/components/schemas/Money'
              discriminator:
                propertyName: method
            examples:
              cash:
                value:
                  method: cash
                  tendered:
                    amount: '50000'
                    currency: KRW
              credit:
                value:
                  method: credit
                  depositCardId: 65f0000000000000000c0011
              wallet:
                value:
                  method: wallet
                  customerUserId: 65f0000000000000000a0001
              mix:
                value:
                  method: mix
                  parts:
                    - method: wallet
                      amount:
                        amount: '20000'
                        currency: KRW
                      customerUserId: 65f0000000000000000a0001
                    - method: credit
                      amount:
                        amount: '30000'
                        currency: KRW
                      depositCardId: 65f0000000000000000c0011
      responses:
        '200':
          description: Payment captured. Order status flips to `paid` if total tender ≥ total.
          headers:
            Idempotency-Replay:
              $ref: '#/components/headers/IdempotencyReplay'
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
                  payments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
                  change:
                    $ref: '#/components/schemas/Money'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Order, card, or wallet customer not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Order not in `bill_requested|bill`, or already paid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                notFinalized:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Bill not finalized
                    status: 409
                    code: bill_not_finalized
                already:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Already paid
                    status: 409
                    code: order_already_billed
        '422':
          description: Validation/business errors (insufficient balance, bad mix, PSP declined, etc.).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                tooLow:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Tendered too low
                    status: 422
                    code: tendered_too_low
                mixMismatch:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Mix total mismatch
                    status: 422
                    code: mix_total_mismatch
                insufficient:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Insufficient balance
                    status: 422
                    code: wallet_insufficient_balance
                declined:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Card declined
                    status: 422
                    code: payment_declined
        '502':
          description: PSP unreachable.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                unreachable:
                  value:
                    type: https://errors.catchtable.example/internal_error
                    title: PSP unreachable
                    status: 502
                    code: psp_unreachable
  /pos/restaurants/{restaurantId}/kitchen/batches:
