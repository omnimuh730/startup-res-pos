        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - POS · Tables
      operationId: posCreateTable
      summary: Create a new table on a floor.
      security:
        - staffAuth: []
      parameters:
        - $ref: '#/components/parameters/RestaurantIdPath'
        - $ref: '#/components/parameters/FloorIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - seats
                - shape
                - size
                - position
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 32
                seats:
                  type: integer
                  minimum: 1
                  maximum: 30
                shape:
                  type: string
                  enum:
                    - circle
                    - square
                    - rect
                    - custom
                size:
                  type: object
                  required:
                    - w
                    - h
                  properties:
                    w:
                      type: integer
                      minimum: 1
                    h:
                      type: integer
                      minimum: 1
                position:
                  type: object
                  required:
                    - x
                    - 'y'
                  properties:
                    x:
                      type: integer
                    'y':
                      type: integer
                z:
                  type: integer
                  default: 0
      responses:
        '201':
          description: Table created.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Table'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Duplicate `name` on the floor.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    put:
      tags:
        - POS · Tables
      operationId: posReplaceFloorTables
      summary: Bulk replace all tables on a floor (used by the floor plan editor's Save action).
      description: |
        Sends the full new layout. Server diffs against current tables:
          * Existing tables (matched by `id`) are updated.
          * New tables (no `id`) are inserted.
          * Tables not in the request are soft-deleted.

        Operation rejects when any tables to be removed currently host an `occupancy` —
        those must be cleared first (returns `409 invalid_transition`).
      security:
        - staffAuth: []
      parameters:
        - $ref: '#/components/parameters/RestaurantIdPath'
        - $ref: '#/components/parameters/FloorIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tables
              properties:
                tables:
                  type: array
                  items:
                    allOf:
                      - $ref: '#/components/schemas/Table'
                      - type: object
                        properties:
                          id:
                            description: Optional. Omit to insert.
      responses:
        '200':
          description: Updated layout.
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
                    minimum: 0
                  updated:
                    type: integer
                    minimum: 0
                  deleted:
                    type: integer
                    minimum: 0
                  tables:
                    type: array
                    items:
                      $ref: '#/components/schemas/Table'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Tried to remove an occupied table.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
