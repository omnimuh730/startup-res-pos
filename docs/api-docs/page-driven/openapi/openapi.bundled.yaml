            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /pos/payments/{paymentId}/refunds:
    post:
      tags:
        - POS · Payments
      operationId: posCreateRefund
      summary: Refund a captured payment (full or partial).
      description: |
        Embeds a new entry in `payments.refunds[]` and triggers the PSP refund. Wallet-paid
        payments credit back to the same wallet pool via a `refund` `wallet_transactions`
        entry. Idempotent on `Idempotency-Key`.
      security:
        - staffAuth: []
      parameters:
        - $ref: '#/components/parameters/PaymentIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - reason
              properties:
                amount:
                  $ref: '#/components/schemas/Money'
                reason:
                  type: string
                  enum:
                    - reservation_declined
                    - user_cancelled
                    - no_show_waiver
                    - order_voided
                    - duplicate
                    - other
                note:
                  type: string
                  maxLength: 500
      responses:
        '201':
          description: Refund accepted; final state arrives via PSP webhook (poll the payment endpoint).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRefund'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          description: Lacks `payments.refund` permission.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Refund already in flight or amount exceeds remaining.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                exceeds:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Exceeds remaining
                    status: 409
                    code: refund_exceeds_net_amount
                duplicate:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Already refunding
                    status: 409
                    code: refund_already_succeeded
        '422':
          description: Currency mismatch.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '502':
          description: PSP unreachable.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                psp:
                  value:
                    type: https://errors.catchtable.example/internal_error
                    title: PSP unreachable
                    status: 502
                    code: psp_unreachable
