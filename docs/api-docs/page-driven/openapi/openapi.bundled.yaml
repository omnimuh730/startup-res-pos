  /me/notifications:
    get:
      tags:
        - Customer · Notifications
      operationId: listNotifications
      summary: List notifications (cursor pagination).
      description: |
        The Notifications page tabs map to `tab` query values:
          * `all`        — every undeleted notification
          * `unread`     — `read=false` only
          * `reservation`— `type` starts with `reservation.`
          * `system`     — `type` starts with `system.`
      parameters:
        - name: tab
          in: query
          schema:
            type: string
            enum:
              - all
              - unread
              - reservation
              - system
            default: all
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Notifications.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      unreadCount:
                        type: integer
                        minimum: 0
                        description: Total unread across all tabs.
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthenticated'
    delete:
      tags:
        - Customer · Notifications
      operationId: deleteAllNotifications
      summary: Soft-delete every notification for the user.
      description: |
        Sets `deletedAt` on all undeleted notifications. The user's `unreadNotifications`
        cache is reset.
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
