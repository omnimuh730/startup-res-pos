  /pos/restaurants/{restaurantId}/subscription:change-plan:
    post:
      tags:
        - POS · Subscriptions
      operationId: posChangeRestaurantPlan
      summary: Choose / change the restaurant's subscription tier.
      description: |
        Implements the 4-step "Upgrade Plans" flow:
          1. Step 1 — Choose plan (this call with `confirm=false`) returns a price preview
             in the response without charging.
          2. Step 2 — Confirm select plan (this call with `confirm=true`) actually creates
             or upgrades/downgrades the subscription. If a charge is needed, returns
             `paymentIntent`. The client must confirm with the PSP.
          3. Step 3 — Try Pay is performed by the client confirming the intent with the PSP.
          4. Step 4 — Update Tier happens server-side on `payment.succeeded` webhook;
             clients should poll `GET ../subscriptions` to see the new tier.

        Idempotent on `Idempotency-Key`.
      security:
        - staffAuth: []
      parameters:
        - $ref: '#/components/parameters/RestaurantIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - planId
                - billingCycle
                - currency
              properties:
                planId:
                  type: string
                  enum:
                    - starter
                    - growth
                    - enterprise
                billingCycle:
                  type: string
                  enum:
                    - monthly
                    - annual
                currency:
                  type: string
                  enum:
                    - KRW
                    - USD
                paymentMethodId:
                  $ref: '#/components/schemas/ObjectId'
                confirm:
                  type: boolean
                  default: false
                  description: When false, returns a price preview only.
      responses:
        '200':
          description: Preview only (when `confirm=false`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  preview:
                    type: object
                    properties:
                      planId:
                        type: string
                      billingCycle:
                        type: string
                        enum:
                          - monthly
                          - annual
                      amount:
                        $ref: '#/components/schemas/Money'
                      prorationCredit:
                        $ref: '#/components/schemas/Money'
                      effectiveAt:
                        type: string
                        format: date-time
        '201':
          description: Subscription change initiated (when `confirm=true`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription:
                    $ref: '#/components/schemas/Subscription'
                  paymentIntent:
                    $ref: '#/components/schemas/PaymentIntentResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          description: Lacks `subscriptions.manage` permission.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Plan not found in `metadata`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                unknownPlan:
                  value:
                    type: https://errors.catchtable.example/not_found
                    title: Unknown plan
                    status: 404
                    code: subscription_plan_unknown
        '409':
          description: A plan change is already in flight.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                inflight:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Change in progress
                    status: 409
                    code: subscription_change_in_flight
        '422':
          description: Currency not supported by the plan.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '502':
          description: PSP unreachable (Step 3 failure).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /pos/restaurants/{restaurantId}/subscription:cancel:
