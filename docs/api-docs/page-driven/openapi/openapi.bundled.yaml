openapi: 3.1.0
info:
  title: CatchTable Page-Driven API
  version: 1.0.0
  summary: HTTP API for the CatchTable POS and reservation app.
  description: |
    Endpoints derived from the page-driven READMEs in `api-docs/page-driven/` and the
    13-collection MongoDB schema in `api-docs/page-driven/schema/`.

    See the `README.md` next to this file for conventions (auth, errors, pagination,
    idempotency) and how to bundle/preview the multi-file spec.
  license:
    name: Proprietary
  contact:
    name: CatchTable Engineering
    email: api@catchtable.example
servers:
  - url: https://api.catchtable.example/v1
    description: Production
  - url: https://api.staging.catchtable.example/v1
    description: Staging
  - url: http://localhost:8080/v1
    description: Local development
security:
  - customerAuth: []
tags:
  - name: Auth
    description: Sign in, sign up, refresh, sign out, password reset (customer + staff).
  - name: Metadata
    description: Read-only catalogs (security questions, plans, tiers, amenities, ...).
  - name: Customer · Profile
    description: Current customer (`/me`), preferences, security answers, devices, payment methods.
  - name: Customer · Social
    description: Saved items, recent searches, friends, daily bonus, referral.
  - name: Customer · Wallets
    description: Wallet balances, top-ups, gifts, transactions.
  - name: Customer · Rewards
    description: Reward tier, points, points ledger.
  - name: Customer · Notifications
    description: In-app notification feed.
  - name: Customer · Support
    description: Support conversations and messages.
  - name: Customer · Subscription
    description: CatchTable Pro subscription.
  - name: Discovery
    description: Discover home, explorer search/map, public restaurant/menu/availability.
  - name: Reservations
    description: Reservation lifecycle (customer-side and POS-side share most resources).
  - name: POS · Restaurant
    description: Restaurant settings, phones, deposit cards, staff, floors, menu.
  - name: POS · Tables
    description: Tables CRUD, QR rotation, status flips.
  - name: POS · Orders
    description: POS orders, items, send-batches, bills, payments.
  - name: POS · Kitchen
    description: Kitchen view (chef batches), accept / complete / recall.
  - name: POS · Payments
    description: Payment queries and refunds.
  - name: POS · Analytics
    description: Sales dashboard, revenue, menu, customers, history.
  - name: POS · Subscription
    description: Restaurant tier subscription.
paths:
  /auth/customer/sign-up:
    post:
      tags:
        - Auth
      operationId: customerSignUp
      summary: Create a customer account.
      description: |
        Creates a new customer account from the **Sign Up mode select → Customer** flow.
        `securityAnswers` corresponds to the questions returned by `GET /metadata/security_questions`.
        Optional `referralCode` redeems a friend's `referral.code` and credits both users
        according to the referral reward in `metadata.subscription_plans`/system policy.

        On success the response includes long-lived `tokens` so the app can deep-link
        straight into Discover.
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - fullName
                - securityAnswers
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                  pattern: ^[a-z0-9._-]+$
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  format: password
                fullName:
                  type: string
                  minLength: 1
                  maxLength: 80
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  example: '+8210123456789'
                referralCode:
                  type: string
                preferredTheme:
                  type: string
                  enum:
                    - airbnb
                    - ocean
                    - forest
                    - midnight
                  default: airbnb
                acceptTermsAt:
                  type: string
                  format: date-time
                securityAnswers:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items:
                    $ref: '#/components/schemas/SignUpSecurityAnswer'
            examples:
              minimal:
                value:
                  username: sarah
                  password: P@ssw0rdStrong!
                  fullName: Sarah Kim
                  email: sarah@example.com
                  phone: '+8210123456789'
                  securityAnswers:
                    - questionId: first_pet_name
                      answer: Mochi
                    - questionId: city_of_birth
                      answer: Busan
                    - questionId: favorite_dish
                      answer: Bibimbap
              withReferral:
                value:
                  username: alex
                  password: P@ssw0rdStrong!
                  fullName: Alex Park
                  referralCode: SARAH-7Q3
                  securityAnswers:
                    - questionId: first_pet_name
                      answer: Coco
                    - questionId: city_of_birth
                      answer: Seoul
                    - questionId: favorite_dish
                      answer: Pasta
      responses:
        '201':
          description: Account created.
          headers:
            Location:
              $ref: '#/components/headers/Location'
            Idempotency-Replay:
              $ref: '#/components/headers/IdempotencyReplay'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthCustomerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Username/email/phone already taken, or referral conflicts.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                usernameTaken:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Conflict
                    status: 409
                    code: username_taken
                    detail: username `sarah` is taken
                referralSelf:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Conflict
                    status: 409
                    code: referral_self_redeem
                    detail: cannot redeem your own referral
        '422':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Problem'
                  - type: object
                    properties:
                      errors:
                        type: array
                        items:
                          $ref: '#/components/schemas/FieldError'
              examples:
                badPassword:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Validation failed
                    status: 422
                    code: password_policy_violation
                    errors:
                      - field: password
                        rule: format
                        message: must include letters and numbers
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/customer/sign-in:
    post:
      tags:
        - Auth
      operationId: customerSignIn
      summary: Sign in as a customer.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identifier
                - password
              properties:
                identifier:
                  type: string
                  description: username, email, or E.164 phone
                password:
                  type: string
                  format: password
                deviceHint:
                  type: object
                  properties:
                    platform:
                      type: string
                      enum:
                        - ios
                        - android
                        - web
                    deviceId:
                      type: string
                    appVersion:
                      type: string
            example:
              identifier: sarah
              password: P@ssw0rdStrong!
              deviceHint:
                platform: ios
                deviceId: apns-ABCDEF
                appVersion: 2.7.0
      responses:
        '200':
          description: Signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthCustomerResponse'
        '401':
          description: Invalid credentials.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                badCreds:
                  value:
                    type: https://errors.catchtable.example/unauthenticated
                    title: Unauthenticated
                    status: 401
                    code: invalid_credentials
                locked:
                  value:
                    type: https://errors.catchtable.example/unauthenticated
                    title: Account locked
                    status: 401
                    code: account_locked
                    detail: Too many failed attempts. Try again in 10 minutes.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/staff/sign-up/restaurant:
    post:
      tags:
        - Auth
      operationId: staffSignUpRestaurant
      summary: Register a new restaurant + manager (Step 1 → Step 2 of the restaurant sign-up flow).
      description: |
        Creates a `restaurants` document in `pending_approval` and the manager `staff_users`
        document in `pending_approval` linked to it.  Returns tokens immediately so the app
        can render the **Approval wait** screen and refresh the restaurant status via realtime.
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - restaurant
                - manager
              properties:
                restaurant:
                  type: object
                  required:
                    - name
                    - cuisine
                    - address
                    - location
                    - contact
                    - businessRegNumber
                  properties:
                    name:
                      type: string
                      maxLength: 120
                    slug:
                      type: string
                    cuisine:
                      type: array
                      items:
                        type: string
                      minItems: 1
                      maxItems: 5
                    priceLevel:
                      type: integer
                      enum:
                        - 1
                        - 2
                        - 3
                        - 4
                    description:
                      type: string
                      maxLength: 4000
                    address:
                      $ref: '#/components/schemas/Address'
                    location:
                      $ref: '#/components/schemas/GeoPoint'
                    contact:
                      type: object
                      properties:
                        primaryPhone:
                          type: string
                        websiteUrl:
                          type: string
                          format: uri-reference
                    businessRegNumber:
                      type: string
                    businessLicenseUrl:
                      type: string
                      format: uri-reference
                manager:
                  type: object
                  required:
                    - username
                    - password
                    - fullName
                  properties:
                    username:
                      type: string
                      minLength: 3
                      maxLength: 32
                      pattern: ^[a-z0-9._-]+$
                    password:
                      type: string
                      format: password
                      minLength: 8
                      maxLength: 128
                    fullName:
                      type: string
                    phone:
                      type: string
                    email:
                      type: string
                      format: email
      responses:
        '201':
          description: Restaurant + manager created in `pending_approval`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStaffResponse'
        '409':
          description: Username taken, business reg number already registered, etc.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/staff/sign-up/staff:
    post:
      tags:
        - Auth
      operationId: staffSignUpStaff
      summary: Apply to join an existing restaurant as a waiter/chef/cashier.
      description: |
        Implements **Restaurant selection 1 → 2 → Staff Registration → Approval wait**.
        Creates a `staff_users` doc in `pending_approval` AND appends a `pendingStaff[]`
        entry to the target restaurant. The manager approves/rejects via
        `POST /pos/restaurants/{restaurantId}/staff/pending/{requestId}:approve`.
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - restaurantId
                - username
                - password
                - fullName
                - requestedRole
              properties:
                restaurantId:
                  $ref: '#/components/schemas/ObjectId'
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                password:
                  type: string
                  format: password
                  minLength: 8
                fullName:
                  type: string
                phone:
                  type: string
                requestedRole:
                  type: string
                  enum:
                    - waiter
                    - chef
                    - cashier
                note:
                  type: string
                  maxLength: 500
      responses:
        '201':
          description: Pending request created. Returns short-lived tokens so app can poll for approval.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStaffResponse'
        '404':
          description: Restaurant not found or not accepting staff applications.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Username taken, or staff already attached to another restaurant.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/staff/sign-in:
    post:
      tags:
        - Auth
      operationId: staffSignIn
      summary: Sign in as a staff member.
      description: |
        A successful response with `passwordIsDefault: true` means the staff member must
        update their password in **Settings → Security** (still allowed to use the app).
        Pending or inactive accounts are rejected with `account_pending_approval` /
        `account_inactive` so the app can render the **Approval wait** screen.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - restaurantId
                - identifier
                - password
              properties:
                restaurantId:
                  $ref: '#/components/schemas/ObjectId'
                identifier:
                  type: string
                  description: username or email
                password:
                  type: string
                  format: password
                deviceHint:
                  type: object
                  properties:
                    platform:
                      type: string
                      enum:
                        - ios
                        - android
                        - web
                    deviceId:
                      type: string
                    appVersion:
                      type: string
      responses:
        '200':
          description: Signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStaffResponse'
        '401':
          description: Invalid credentials, account inactive, or pending approval.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                pending:
                  value:
                    type: https://errors.catchtable.example/unauthenticated
                    title: Pending approval
                    status: 401
                    code: account_pending_approval
                inactive:
                  value:
                    type: https://errors.catchtable.example/unauthenticated
                    title: Account inactive
                    status: 401
                    code: account_inactive
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/sign-out:
    post:
      tags:
        - Auth
      operationId: signOut
      summary: Sign out the current session.
      description: Revokes the access token and (optionally) the refresh token. Idempotent.
      security:
        - customerAuth: []
        - staffAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: Optional. If supplied, also revoked.
                allDevices:
                  type: boolean
                  default: false
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/refresh:
    post:
      tags:
        - Auth
      operationId: refreshTokens
      summary: Exchange a refresh token for a new access (and refresh) token.
      description: |
        Customer or staff. The new tokens preserve the original `subjectKind` and any tenant
        claim. Refresh-token reuse (i.e. presenting an already-rotated token) revokes the
        whole session family and returns 401.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Refresh token invalid, expired, or reused.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/password-reset/start:
    post:
      tags:
        - Auth
      operationId: passwordResetStart
      summary: Begin the password reset flow.
      description: |
        Returns the customer's two security questions (no answers!) and a `resetSessionId`.
        The endpoint is rate-limited per identifier; it never reveals whether the account exists.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identifier
              properties:
                identifier:
                  type: string
                  description: username, email, or phone
      responses:
        '200':
          description: Reset session created (always, even if the user does not exist — questions are dummies in that case).
          content:
            application/json:
              schema:
                type: object
                required:
                  - resetSessionId
                  - questions
                  - expiresAt
                properties:
                  resetSessionId:
                    type: string
                  questions:
                    type: array
                    minItems: 2
                    maxItems: 2
                    items:
                      type: object
                      properties:
                        questionId:
                          type: string
                        prompt:
                          type: string
                  expiresAt:
                    type: string
                    format: date-time
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/password-reset/verify-question:
    post:
      tags:
        - Auth
      operationId: passwordResetVerifyQuestion
      summary: Submit answers to the security questions.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resetSessionId
                - answers
              properties:
                resetSessionId:
                  type: string
                answers:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    type: object
                    required:
                      - questionId
                      - answer
                    properties:
                      questionId:
                        type: string
                      answer:
                        type: string
                        minLength: 1
                        maxLength: 256
      responses:
        '200':
          description: Answers correct. Returns a one-shot `verificationToken` for `complete`.
          content:
            application/json:
              schema:
                type: object
                required:
                  - verificationToken
                  - expiresAt
                properties:
                  verificationToken:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
        '401':
          description: Wrong answers; remaining attempts in `code`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                wrong:
                  value:
                    type: https://errors.catchtable.example/unauthenticated
                    title: Wrong answers
                    status: 401
                    code: security_answer_invalid
                    detail: 2 attempts remaining
                exhausted:
                  value:
                    type: https://errors.catchtable.example/unauthenticated
                    title: Locked
                    status: 401
                    code: security_answer_attempts_exceeded
        '410':
          description: Reset session expired.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                expired:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Expired
                    status: 410
                    code: reset_token_expired
  /auth/password-reset/complete:
    post:
      tags:
        - Auth
      operationId: passwordResetComplete
      summary: Set a new password using a verification token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - verificationToken
                - newPassword
              properties:
                verificationToken:
                  type: string
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                  maxLength: 128
      responses:
        '200':
          description: Password updated. Returns fresh tokens so the user is signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Verification token invalid or expired.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: New password violates policy.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                tooShort:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Validation failed
                    status: 422
                    code: password_policy_violation
                    detail: minimum length is 8
  /auth/username-available:
    get:
      tags:
        - Auth
      operationId: checkUsername
      summary: Check whether a username is available.
      description: Used by the sign-up form to debounce availability checks. Always returns 200.
      security: []
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 32
            pattern: ^[a-z0-9._-]+$
      responses:
        '200':
          description: Availability info.
          content:
            application/json:
              schema:
                type: object
                required:
                  - available
                properties:
                  available:
                    type: boolean
                  suggestions:
                    type: array
                    items:
                      type: string
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /metadata/{catalog}:
    get:
      tags:
        - Metadata
      operationId: getMetadataCatalog
      summary: Read a static catalog by id.
      description: |
        Returns one catalog (e.g. `security_questions`, `subscription_plans`, `reward_tiers`,
        `amenities`, `reservation_preferences`, `support_articles`, `occasions`,
        `feature_flags`).

        Supports `If-None-Match` for cheap polling.  Versioned by the catalog's `version`
        field, returned as the strong ETag.
      security:
        - publicAuth: []
      parameters:
        - $ref: '#/components/parameters/CatalogPath'
        - $ref: '#/components/parameters/AcceptLanguageHeader'
        - name: If-None-Match
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Catalog document.
          headers:
            ETag:
              description: Strong ETag of the catalog (`"v123"`).
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
              description: Always `public, max-age=300, stale-while-revalidate=86400`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataDoc'
              examples:
                securityQuestions:
                  value:
                    id: security_questions
                    version: 3
                    items:
                      - code: first_pet_name
                        prompt: What was your first pet's name?
                      - code: city_of_birth
                        prompt: In what city were you born?
                      - code: favorite_dish
                        prompt: What is your favorite dish?
                    updatedAt: '2026-04-01T00:00:00.000Z'
                subscriptionPlans:
                  value:
                    id: subscription_plans
                    version: 7
                    items:
                      - product: catchtable_pro
                        code: pro_monthly
                        price:
                          amount: '6.99'
                          currency: USD
                        interval: month
                      - product: restaurant_tier
                        code: pro_monthly
                        tier: pro
                        price:
                          amount: '99000'
                          currency: KRW
                        interval: month
                        perks:
                          - unlimited_qr
                          - advanced_analytics
                          - priority_support
        '304':
          description: Not modified — client cache is up to date.
        '404':
          description: Unknown catalog id.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /me:
    get:
      tags:
        - Customer · Profile
      operationId: getMe
      summary: Read the current customer's full profile.
      description: |
        Returns the entire `customer_users` document (without the password hash). This is
        the single read used by the **Profile** tab and most app bootstrapping calls.
      responses:
        '200':
          description: Profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerUser'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Customer · Profile
      operationId: updateMe
      summary: Update editable profile fields.
      description: Only fields explicitly listed are accepted. Unknown fields are rejected (422).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                fullName:
                  type: string
                  minLength: 1
                  maxLength: 80
                displayName:
                  type:
                    - string
                    - 'null'
                  maxLength: 80
                email:
                  type:
                    - string
                    - 'null'
                  format: email
                phone:
                  type:
                    - string
                    - 'null'
                avatarUrl:
                  type:
                    - string
                    - 'null'
                  format: uri-reference
      responses:
        '200':
          description: Updated profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerUser'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '409':
          description: Email or phone collision.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /me/preferences:
    put:
      tags:
        - Customer · Profile
      operationId: putPreferences
      summary: Replace preferences (theme, locale, location).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - theme
              properties:
                theme:
                  type: string
                  enum:
                    - airbnb
                    - ocean
                    - forest
                    - midnight
                locale:
                  type: string
                location:
                  type:
                    - object
                    - 'null'
                  properties:
                    areaId:
                      $ref: '#/components/schemas/ObjectId'
                    lat:
                      type: number
                    lng:
                      type: number
                    label:
                      type: string
      responses:
        '200':
          description: Updated preferences.
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences:
                    $ref: '#/components/schemas/preferences'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /me/security-answers:
    put:
      tags:
        - Customer · Profile
      operationId: putSecurityAnswers
      summary: Update the three security questions/answers used by password reset.
      description: Replaces all three answers atomically. Requires the current password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - answers
              properties:
                currentPassword:
                  type: string
                  format: password
                answers:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items:
                    $ref: '#/components/schemas/SignUpSecurityAnswer'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          description: Wrong current password.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /me/password:
    put:
      tags:
        - Customer · Profile
      operationId: changePassword
      summary: Change the password.
      description: |
        Used by both the regular **Settings → Security** flow and by staff who must change
        a default-issued password. Returns new tokens so the current device stays signed in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                  maxLength: 128
                signOutOtherSessions:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Current password incorrect.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: New password violates policy.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                policy:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Validation failed
                    status: 422
                    code: password_policy_violation
  /me/devices:
    get:
      tags:
        - Customer · Profile
      operationId: listDevices
      summary: List the customer's registered push devices.
      responses:
        '200':
          description: Devices.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'
        '401':
          $ref: '#/components/responses/Unauthenticated'
    post:
      tags:
        - Customer · Profile
      operationId: registerDevice
      summary: Register or update a push token for the current device.
      description: Idempotent on `(provider, token)`. Used to wire up FCM/APNs/web-push.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
                - token
                - platform
              properties:
                provider:
                  type: string
                  enum:
                    - fcm
                    - apns
                    - web_push
                token:
                  type: string
                  minLength: 8
                  maxLength: 4096
                platform:
                  type: string
                  enum:
                    - ios
                    - android
                    - web
                appVersion:
                  type: string
                deviceId:
                  type: string
      responses:
        '200':
          description: Device upserted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /me/devices/{deviceId}:
    delete:
      tags:
        - Customer · Profile
      operationId: deleteDevice
      summary: Remove a push device. Idempotent.
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/payment-methods:
    get:
      tags:
        - Customer · Profile
      operationId: listPaymentMethods
      summary: List saved payment methods.
      responses:
        '200':
          description: Payment methods.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
        '401':
          $ref: '#/components/responses/Unauthenticated'
    post:
      tags:
        - Customer · Profile
      operationId: addPaymentMethod
      summary: Save a payment method (after PSP-side tokenization).
      description: |
        The client first tokenizes the card with the PSP SDK (Stripe Elements, Apple Pay,
        PayPal Checkout, etc.) and posts the resulting `pspExternalId` here. The server
        never sees raw PAN.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pspProvider
                - pspExternalId
                - kind
              properties:
                pspProvider:
                  type: string
                  example: stripe
                pspExternalId:
                  type: string
                kind:
                  type: string
                  enum:
                    - card
                    - apple_pay
                    - google_pay
                    - paypal
                    - bank_account
                isDefault:
                  type: boolean
                  default: false
                fundsForeign:
                  type: boolean
                  default: true
                fundsDomestic:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Payment method added.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '409':
          description: PSP token already saved or invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /me/payment-methods/{methodId}:
    patch:
      tags:
        - Customer · Profile
      operationId: updatePaymentMethod
      summary: Toggle default and pool flags.
      parameters:
        - $ref: '#/components/parameters/MethodIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                isDefault:
                  type: boolean
                fundsForeign:
                  type: boolean
                fundsDomestic:
                  type: boolean
      responses:
        '200':
          description: Updated method.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Customer · Profile
      operationId: deletePaymentMethod
      summary: Delete a saved payment method.
      description: |
        Returns 409 if it is the only method funding an active subscription;
        in that case the client must call `/me/subscription:change-payment-method` first.
      parameters:
        - $ref: '#/components/parameters/MethodIdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Method in use by an active subscription.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                inUse:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: In use
                    status: 409
                    code: payment_method_required
                    detail: Method funds an active subscription
  /me/saved-items:
    get:
      tags:
        - Customer · Social
      operationId: listSavedItems
      summary: List saved restaurants and dishes.
      parameters:
        - name: itemType
          in: query
          schema:
            type: string
            enum:
              - restaurant
              - food
              - all
            default: all
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Saved items.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SavedItem'
        '401':
          $ref: '#/components/responses/Unauthenticated'
    post:
      tags:
        - Customer · Social
      operationId: addSavedItem
      summary: Save a restaurant or dish.
      description: Idempotent on `(itemType, restaurantId|foodId)`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required:
                    - itemType
                    - restaurantId
                  properties:
                    itemType:
                      const: restaurant
                    restaurantId:
                      $ref: '#/components/schemas/ObjectId'
                - type: object
                  required:
                    - itemType
                    - restaurantId
                    - foodId
                  properties:
                    itemType:
                      const: food
                    restaurantId:
                      $ref: '#/components/schemas/ObjectId'
                    foodId:
                      $ref: '#/components/schemas/ObjectId'
      responses:
        '201':
          description: Saved (or returned existing if idempotent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedItem'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: Restaurant or food not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /me/saved-items/{savedItemId}:
    delete:
      tags:
        - Customer · Social
      operationId: deleteSavedItem
      summary: Remove a saved item. Idempotent.
      parameters:
        - $ref: '#/components/parameters/SavedItemIdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/recent-searches:
    get:
      tags:
        - Customer · Social
      operationId: listRecentSearches
      summary: List the last 30 search terms (most recent first).
      parameters:
        - name: kind
          in: query
          schema:
            type: string
            enum:
              - restaurant
              - cuisine
              - location
              - freeform
              - all
            default: all
      responses:
        '200':
          description: Recent searches.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecentSearch'
        '401':
          $ref: '#/components/responses/Unauthenticated'
    post:
      tags:
        - Customer · Social
      operationId: pushRecentSearch
      summary: Push a search query into the recent list.
      description: |
        The server keeps at most 30 entries per user, dropping the oldest.
        Duplicates of the same `(kind, query)` are de-duplicated and bubble to the top.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - kind
                - query
              properties:
                kind:
                  type: string
                  enum:
                    - restaurant
                    - cuisine
                    - location
                    - freeform
                query:
                  type: string
                  minLength: 1
                  maxLength: 200
                restaurantId:
                  $ref: '#/components/schemas/ObjectId'
                cuisineCode:
                  type: string
                locationId:
                  $ref: '#/components/schemas/ObjectId'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags:
        - Customer · Social
      operationId: clearRecentSearches
      summary: Clear all recent searches.
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /me/friends:
    get:
      tags:
        - Customer · Social
      operationId: listFriends
      summary: List accepted friends.
      parameters:
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Friends.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Friend'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /me/friends/{friendId}:
    delete:
      tags:
        - Customer · Social
      operationId: removeFriend
      summary: Unfriend or revoke a request.
      parameters:
        - $ref: '#/components/parameters/FriendIdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/friend-requests:
    get:
      tags:
        - Customer · Social
      operationId: listFriendRequests
      summary: List incoming and outgoing friend requests.
      parameters:
        - name: direction
          in: query
          schema:
            type: string
            enum:
              - incoming
              - outgoing
              - all
            default: all
      responses:
        '200':
          description: Friend requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friend'
        '401':
          $ref: '#/components/responses/Unauthenticated'
    post:
      tags:
        - Customer · Social
      operationId: sendFriendRequest
      summary: Send a friend request by username.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
      responses:
        '201':
          description: Request sent (or accepted if the other side already requested).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Friend'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: Username not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Already friends, blocked, or self-request.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                self:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Conflict
                    status: 409
                    code: cannot_invite_self
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /me/friend-requests/{requestId}:accept:
    post:
      tags:
        - Customer · Social
      operationId: acceptFriendRequest
      summary: Accept an incoming friend request.
      parameters:
        - $ref: '#/components/parameters/FriendRequestIdPath'
      responses:
        '200':
          description: Now friends.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Friend'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Request already decided.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /me/friend-requests/{requestId}:decline:
    post:
      tags:
        - Customer · Social
      operationId: declineFriendRequest
      summary: Decline an incoming friend request.
      parameters:
        - $ref: '#/components/parameters/FriendRequestIdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /me/friend-invites/by-phone:
    post:
      tags:
        - Customer · Social
      operationId: inviteFriendByPhone
      summary: Invite a friend by phone number (sends SMS deep link).
      description: |
        Looks up the phone number; if a customer exists the invite becomes a friend request,
        otherwise an SMS invite is recorded against the user with `source=phone_invite`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                  example: '+8210123456789'
                message:
                  type: string
                  maxLength: 240
      responses:
        '202':
          description: Invite queued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - request_sent
                      - sms_sent
                  friend:
                    $ref: '#/components/schemas/Friend'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /me/daily-bonus:
    get:
      tags:
        - Customer · Social
      operationId: getDailyBonus
      summary: Read today's daily-bonus state.
      description: |
        Returns the three boxes shown on the **Profile → Daily Bonus** banner along with
        whether the user has already claimed today.
      responses:
        '200':
          description: Daily bonus state.
          content:
            application/json:
              schema:
                type: object
                required:
                  - localDate
                  - alreadyClaimed
                  - boxes
                properties:
                  localDate:
                    type: string
                    format: date
                  alreadyClaimed:
                    type: boolean
                  boxes:
                    type: array
                    minItems: 3
                    maxItems: 3
                    items:
                      type: object
                      required:
                        - index
                        - hint
                      properties:
                        index:
                          type: integer
                          enum:
                            - 0
                            - 1
                            - 2
                        hint:
                          type: string
                          description: Server-side teaser; the actual reward is hidden until the claim.
                  streakDays:
                    type: integer
                    minimum: 0
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/items'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /me/daily-bonus:claim:
    post:
      tags:
        - Customer · Social
      operationId: claimDailyBonus
      summary: Claim a box.
      description: |
        Server picks the reward server-side based on the chosen box index and the current
        rotation. Idempotent for `(userId, localDate)`. Repeated calls with the same date
        return 409.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - boxIndex
              properties:
                boxIndex:
                  type: integer
                  enum:
                    - 0
                    - 1
                    - 2
      responses:
        '200':
          description: Reward granted.
          content:
            application/json:
              schema:
                type: object
                required:
                  - reward
                  - balanceAfter
                properties:
                  reward:
                    $ref: '#/components/schemas/DailyBonusReward'
                  walletTransactionId:
                    $ref: '#/components/schemas/ObjectId'
                  pointsLedgerId:
                    $ref: '#/components/schemas/ObjectId'
                  balanceAfter:
                    type: object
                    description: Caches updated.
                    properties:
                      rewardsPoints:
                        type: integer
                      bonusBalance:
                        $ref: '#/components/schemas/Money'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '409':
          description: Already claimed today.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                already:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Already claimed
                    status: 409
                    code: daily_bonus_already_claimed
  /me/referral:
    get:
      tags:
        - Customer · Social
      operationId: getReferral
      summary: Read referral code, share link, and redemption history.
      responses:
        '200':
          description: Referral info.
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - shareUrl
                  - redemptions
                properties:
                  code:
                    type: string
                    example: SARAH-7Q3
                  shareUrl:
                    type: string
                    format: uri-reference
                  referredByCode:
                    type:
                      - string
                      - 'null'
                  redemptions:
                    type: array
                    items:
                      $ref: '#/components/schemas/redemptions-items'
                  reward:
                    type: object
                    properties:
                      perRedemption:
                        type: object
                        properties:
                          kind:
                            type: string
                            enum:
                              - points
                              - wallet
                          amount:
                            type: number
                          currency:
                            type: string
                      selfBonus:
                        type: object
                        properties:
                          kind:
                            type: string
                            enum:
                              - points
                              - wallet
                          amount:
                            type: number
                          currency:
                            type: string
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /me/referral:redeem:
    post:
      tags:
        - Customer · Social
      operationId: redeemReferral
      summary: Redeem a friend's referral code (must not have redeemed before).
      description: |
        Sign-up usually carries `referralCode`; this endpoint exists for users who skipped
        that step. One-shot: returns 409 if already redeemed.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  example: SARAH-7Q3
      responses:
        '200':
          description: Redeemed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  walletTransactionId:
                    $ref: '#/components/schemas/ObjectId'
                  pointsLedgerId:
                    $ref: '#/components/schemas/ObjectId'
                  reward:
                    type: object
                    properties:
                      kind:
                        type: string
                        enum:
                          - points
                          - wallet
                      amount:
                        type: number
                      currency:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: Unknown code.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                invalid:
                  value:
                    type: https://errors.catchtable.example/not_found
                    title: Invalid code
                    status: 404
                    code: referral_code_invalid
        '409':
          description: Already redeemed or self-referral.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                self:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Conflict
                    status: 409
                    code: referral_self_redeem
                already:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Already redeemed
                    status: 409
                    code: referral_already_redeemed
  /me/wallets:
    get:
      tags:
        - Customer · Wallets
      operationId: getWallets
      summary: Read wallet balances (cache from `customer_users.wallets`).
      description: |
        Cheap read backed by the cache on the user document. The authoritative source is
        the `wallet_transactions` ledger; the cache is updated atomically with each entry.
      responses:
        '200':
          description: Wallets cache.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWallets'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /me/wallets/transactions:
    get:
      tags:
