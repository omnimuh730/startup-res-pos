    FieldError:
      type: object
      required:
        - field
        - rule
        - message
      properties:
        field:
          type: string
          example: partySize
        rule:
          type: string
          example: range
          description: Validation rule name (`required`, `range`, `format`, `enum`, `unique`, ...).
        message:
          type: string
          example: must be between 1 and 20
    Problem:
      type: object
      description: RFC 7807 Problem Details with CatchTable extensions.
      required:
        - type
        - title
        - status
        - code
      properties:
        type:
          type: string
          format: uri
          description: URI reference identifying the error class.
          example: https://errors.catchtable.example/validation_failed
        title:
          type: string
          example: Validation failed
        status:
          type: integer
          minimum: 400
          maximum: 599
          example: 422
        code:
          $ref: '#/components/schemas/ErrorCode'
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
          description: Path of the failed request.
        traceId:
          type: string
          description: Echoed in `X-Request-Id` for log correlation.
        errors:
          type: array
          description: Per-field validation errors (only present when status=422).
          items:
            $ref: '#/components/schemas/FieldError'
        retryAfterSec:
          type: integer
          minimum: 0
          description: Equivalent to `Retry-After`.
