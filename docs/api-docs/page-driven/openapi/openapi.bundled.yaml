              required:
                - planCode
              properties:
                planCode:
                  type: string
                  enum:
                    - pro_monthly
                    - pro_quarterly
                    - pro_yearly
      responses:
        '200':
          description: Updated subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Plan not changeable now (e.g. past_due).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /me/subscription:change-payment-method:
    post:
      tags:
        - Customer · Subscription
      operationId: changeSubscriptionPaymentMethod
      summary: Replace the card funding the subscription.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - paymentMethodId
              properties:
                paymentMethodId:
                  $ref: '#/components/schemas/ObjectId'
      responses:
        '200':
          description: Updated subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: Subscription or payment method not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /discover:
    get:
      tags:
        - Discovery
      operationId: getDiscoverHome
      summary: Render the Discover landing page (multiple curated sections).
      description: |
        Returns the full set of horizontal sections shown on the **Discover** screen
        (hero banner, near me, top rated, editor's picks, new in town, weekly picks,
        flash deals, recently viewed, your favorites). Personalized when the request
        carries a customer token; otherwise returns location-based defaults.
      security:
        - publicAuth: []
      parameters:
        - name: lat
          in: query
          schema:
            type: number
            format: double
        - name: lng
          in: query
          schema:
            type: number
            format: double
        - name: areaId
          in: query
          schema:
            $ref: '#/components/schemas/ObjectId'
      responses:
        '200':
          description: Sections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoverHome'
        '422':
          description: Neither location nor areaId provided and unable to infer.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                noLocation:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Location required
                    status: 422
                    code: location_required
                    detail: lat,lng or areaId is required
        '500':
          $ref: '#/components/responses/InternalServerError'
  /restaurants:
    get:
      tags:
        - Discovery
      operationId: searchRestaurants
      summary: Search/filter restaurants — used by Explorer search bar, list, and map.
      description: |
        A single endpoint that powers all three Explorer projections (search results,
        map clusters, and the recommended-on-the-bottom-sheet list). Sorting defaults to
        distance when `near=` is provided.

        Map clients pass `?bbox=west,south,east,north` and `?clusterPrecision` to receive
        cluster groups instead of individual restaurants for high zoom levels.
      security:
        - publicAuth: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
            maxLength: 200
          description: Free-text query (name, cuisine, dish hint).
        - name: cuisine
          in: query
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: priceLevel
          in: query
          explode: false
          schema:
            type: array
            items:
              type: integer
              enum:
                - 1
                - 2
                - 3
                - 4
        - name: amenity
          in: query
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: open
          in: query
          schema:
            type: string
            enum:
              - now
              - today
        - name: near
          in: query
          schema:
            type: string
            pattern: ^-?[0-9]+(\.[0-9]+)?,-?[0-9]+(\.[0-9]+)?$
            description: '`lat,lng`'
        - name: radiusMeters
          in: query
          schema:
            type: integer
            minimum: 100
            maximum: 50000
            default: 5000
        - name: bbox
          in: query
          schema:
            type: string
            description: '`west,south,east,north`'
        - name: clusterPrecision
          in: query
          schema:
            type: integer
            minimum: 4
            maximum: 12
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - distance
              - rating
              - price_asc
              - price_desc
              - popularity
            default: distance
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Restaurants and/or clusters.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageInfo'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RestaurantCard'
                      clusters:
                        type: array
                        description: Returned only when `clusterPrecision` is provided.
                        items:
                          type: object
                          properties:
                            cellId:
                              type: string
                            center:
                              $ref: '#/components/schemas/GeoPoint'
                            count:
                              type: integer
                              minimum: 1
                            sample:
                              $ref: '#/components/schemas/RestaurantCard'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /restaurants/suggestions:
    get:
      tags:
        - Discovery
      operationId: getSuggestions
      summary: Autocomplete suggestions for the Explorer search bar.
      security:
        - publicAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 200
        - name: lat
          in: query
          schema:
            type: number
            format: double
        - name: lng
          in: query
          schema:
            type: number
            format: double
      responses:
        '200':
          description: Suggestions grouped by kind.
          content:
            application/json:
              schema:
                type: object
                properties:
                  restaurants:
                    type: array
                    items:
                      $ref: '#/components/schemas/RestaurantCard'
                  cuisines:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                        label:
                          type: string
                  locations:
                    type: array
                    items:
                      type: object
                      properties:
                        areaId:
                          $ref: '#/components/schemas/ObjectId'
                        label:
                          type: string
                        region:
                          type: string
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /restaurants/{restaurantId}:
    get:
      tags:
        - Discovery
      operationId: getPublicRestaurant
      summary: Public restaurant page (used by Explorer detail and Reservation step 1 header).
      security:
        - publicAuth: []
      parameters:
        - $ref: '#/components/parameters/RestaurantIdPath'
      responses:
        '200':
          description: Restaurant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicRestaurant'
        '404':
          $ref: '#/components/responses/NotFound'
  /restaurants/{restaurantId}/menu:
    get:
      tags:
        - Discovery
      operationId: getPublicMenu
      summary: Public menu (sub of GetPublicRestaurant for menu-only screens).
      security:
        - publicAuth: []
      parameters:
        - $ref: '#/components/parameters/RestaurantIdPath'
        - name: includeUnavailable
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Menu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
        '404':
          $ref: '#/components/responses/NotFound'
  /restaurants/{restaurantId}/availability:
    get:
      tags:
        - Discovery
      operationId: getAvailability
      summary: List available dates+times for a restaurant (Reservation step 1 calendar).
      description: |
        Returns availability slots for the next `days` (default 14) starting at `from`.
        Slots are bucketed into the restaurant's reservation cadence (typically 30 min).
        Slot `available=false` is returned for past times and fully-booked windows so the
        UI can grey them out.
      security:
        - publicAuth: []
      parameters:
        - $ref: '#/components/parameters/RestaurantIdPath'
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: days
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 14
        - name: partySize
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 20
      responses:
        '200':
          description: Availability slots.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AvailabilitySlot'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /me/reservations:
    get:
      tags:
        - Reservations
      operationId: listMyReservations
      summary: List reservations for the current customer (Dining tabs).
      description: |
        Tabs map to `tab` values:
          * `upcoming` — future `requested|confirmed|arrived|dining|bill_requested|bill`
          * `past`     — `visited|cancelled|no_show`
          * `invited`  — reservations the user is invited to (via `invites[]`)
      parameters:
        - name: tab
          in: query
          schema:
            type: string
            enum:
              - upcoming
              - past
              - invited
              - all
            default: upcoming
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Reservations.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Reservation'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /me/active-draft:
    get:
      tags:
        - Reservations
      operationId: getActiveDraft
      summary: Read the customer's current reservation draft (Reservation step 1-3 state).
      responses:
        '200':
          description: Draft (or null).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ReservationDraft'
                  - type: 'null'
        '401':
          $ref: '#/components/responses/Unauthenticated'
    put:
      tags:
        - Reservations
      operationId: putActiveDraft
      summary: Upsert the active draft (per-step partial saves).
      description: |
        Replaces the entire `activeDraft` document. Caller is expected to do
        read-modify-write at every step. Server validates that `step` only moves forward
        by one or stays equal, and that required fields for the step are present.

        The draft TTL (`expiresAt`) is bumped 24h on every save.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationDraft'
      responses:
        '200':
          description: Draft saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationDraft'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: Restaurant not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Draft step jumped or moved backward.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                skipped:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Step skipped
                    status: 409
                    code: draft_step_skipped
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags:
        - Reservations
      operationId: deleteActiveDraft
      summary: Discard the active draft.
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /reservations:
    post:
      tags:
        - Reservations
      operationId: createReservation
      summary: Promote the active draft into a real reservation.
      description: |
        The body must reference the draft (`draftId` or `restaurantId`) AND, when the
        restaurant requires deposit, a paid `paymentId`. The server re-validates seat
        availability with a transaction; if the slot was just taken it returns
        `409 seat_not_available` and the client should refresh `/availability`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - restaurantId
              properties:
                restaurantId:
                  $ref: '#/components/schemas/ObjectId'
                paymentId:
                  description: Required when restaurant.settings.general.deposit.amountPerGuest > 0.
                  allOf:
                    - $ref: '#/components/schemas/ObjectId'
                inviteUsernames:
                  type: array
                  items:
                    type: string
                  maxItems: 19
                  description: Optional friends to auto-invite. Bypasses the separate `:invites` call.
            example:
              restaurantId: 65f0000000000000000b0001
              paymentId: 65f0000000000000000d0010
              inviteUsernames:
                - alex
      responses:
        '201':
          description: Reservation created.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: Restaurant or draft not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Seat just taken, or deposit currency mismatch, or duplicate idempotency key.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                seatGone:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Seat not available
                    status: 409
                    code: seat_not_available
                currency:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Currency mismatch
                    status: 409
                    code: currency_mismatch
        '422':
          description: Missing fields or deposit required but not paid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                depositRequired:
                  value:
                    type: https://errors.catchtable.example/validation_failed
                    title: Deposit required
                    status: 422
                    code: deposit_required
  /reservations/{reservationId}:
    get:
      tags:
        - Reservations
      operationId: getReservation
      summary: Read one reservation (customer + POS use this).
      description: |
        Authorization:
          * Customer token must be the `userId` or be among `invites[].inviteeUserId` with status accepted.
          * Staff token must match the reservation's `restaurantId`.
      security:
        - customerAuth: []
        - staffAuth: []
      parameters:
        - $ref: '#/components/parameters/ReservationIdPath'
      responses:
        '200':
          description: Reservation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /reservations/{reservationId}:cancel:
    post:
      tags:
        - Reservations
      operationId: cancelReservation
      summary: Customer cancels a reservation.
      description: |
        Refunds the deposit (if any) according to the restaurant's cancellation policy
        encoded in `metadata.feature_flags`/business policy. Returns 409 if the cancel
        window has already passed.
      parameters:
        - $ref: '#/components/parameters/ReservationIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: Reservation cancelled. `refundId` set if applicable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Already cancelled, already started, or past cancel window.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                tooLate:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Too late to cancel
                    status: 409
                    code: too_late_to_cancel
                alreadyCancelled:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Already cancelled
                    status: 409
                    code: reservation_already_cancelled
  /reservations/{reservationId}:rate:
    post:
      tags:
        - Reservations
      operationId: rateReservation
      summary: Submit a post-visit rating + comment (Dining → past tab).
      parameters:
        - $ref: '#/components/parameters/ReservationIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rating
              properties:
                rating:
                  type: number
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
                  maxLength: 2000
      responses:
        '200':
          description: Rating saved. May credit `points_ledger` `review_bonus`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservation:
                    $ref: '#/components/schemas/Reservation'
                  pointsAwarded:
                    type: integer
                    minimum: 0
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Reservation not visited or already rated.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /reservations/{reservationId}/invites:
    get:
      tags:
        - Reservations
      operationId: listInvites
      summary: List all invites on a reservation.
      parameters:
        - $ref: '#/components/parameters/ReservationIdPath'
      responses:
        '200':
          description: Invites.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReservationInvite'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - Reservations
      operationId: createReservationInvite
      summary: Invite a friend (by `userId`, `username`, or `phone`).
      parameters:
        - $ref: '#/components/parameters/ReservationIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inviteeUserId:
                  $ref: '#/components/schemas/ObjectId'
                username:
                  type: string
                phone:
                  type: string
              oneOf:
                - required:
                    - inviteeUserId
                - required:
                    - username
                - required:
                    - phone
      responses:
        '201':
          description: Invite created (sends notification + SMS as appropriate).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationInvite'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Already invited, party-size cap exceeded, or self-invite.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                cap:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Party too large
                    status: 409
                    code: party_too_large
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /reservations/{reservationId}/invites/{inviteId}:
    delete:
      tags:
        - Reservations
      operationId: cancelReservationInvite
      summary: Cancel/recall an invite that has not been accepted yet.
      parameters:
        - $ref: '#/components/parameters/ReservationIdPath'
        - $ref: '#/components/parameters/InviteIdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /reservations/invites/{inviteToken}:accept:
    post:
      tags:
        - Reservations
      operationId: acceptReservationInvite
      summary: Accept a reservation invite via shareLink.
      description: |
        Token comes from the invite's `shareLink`. The invitee must be authenticated;
        if they are not yet a friend of the host they remain unchanged.
      parameters:
        - $ref: '#/components/parameters/InviteTokenPath'
      responses:
        '200':
          description: Invite accepted; reservation included for client convenience.
          content:
            application/json:
              schema:
                type: object
                properties:
                  invite:
                    $ref: '#/components/schemas/ReservationInvite'
                  reservation:
                    $ref: '#/components/schemas/Reservation'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: Invite token invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Invite already decided or expired.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                expired:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Invite expired
                    status: 409
                    code: invite_expired
                already:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Invite already decided
                    status: 409
                    code: invite_already_decided
  /reservations/invites/{inviteToken}:decline:
    post:
      tags:
        - Reservations
      operationId: declineReservationInvite
      summary: Decline a reservation invite via shareLink.
      parameters:
        - $ref: '#/components/parameters/InviteTokenPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /reservations/{reservationId}:check-in-by-qr:
    post:
      tags:
        - Reservations
      operationId: checkInByQr
      summary: Customer scans the table QR to self-check-in.
      description: |
        The QR carries `tableId` + `rotationVersion` + `payloadHash` + signed `validUntil`.
        Server validates:
          * QR matches table's current `qrCode.payloadHash`
          * `rotationVersion` matches (rotated QR returns `qr_rotated`)
          * Current time within `validFrom`/`validUntil`
          * Reservation belongs to the same restaurant
          * Reservation `scheduledFor` is within the restaurant's grace window
      parameters:
        - $ref: '#/components/parameters/ReservationIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - qrPayload
              properties:
                qrPayload:
                  type: string
                  minLength: 8
                  maxLength: 1024
      responses:
        '200':
          description: Checked in. Reservation status is now `arrived`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: QR invalid/rotated/out of window, or already checked in.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                rotated:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: QR rotated
                    status: 409
                    code: qr_rotated
                wrongTable:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: QR mismatch
                    status: 409
                    code: qr_table_mismatch
                outsideGrace:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Out of grace window
                    status: 409
                    code: qr_outside_grace_window
  /pos/restaurants/{restaurantId}/reservations:
    get:
      tags:
        - POS · Reservations
        - Reservations
      operationId: posListReservations
