        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topic
                - body
              properties:
                topic:
                  type: string
                  enum:
                    - reservation
                    - payment
                    - account
                    - refund
                    - technical
                    - other
                subject:
                  type: string
                  maxLength: 200
                body:
                  type: string
                  minLength: 1
                  maxLength: 8000
                context:
                  type: object
                  properties:
                    reservationId:
                      $ref: '#/components/schemas/ObjectId'
                    orderId:
                      $ref: '#/components/schemas/ObjectId'
                    paymentId:
                      $ref: '#/components/schemas/ObjectId'
                    articleSlug:
                      type: string
                attachments:
                  type: array
                  items:
                    type: object
                    properties:
                      url:
                        type: string
