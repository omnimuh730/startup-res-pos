  /pos/restaurants/{restaurantId}/tables/{tableId}/status:
    put:
      tags:
        - POS · Tables
      operationId: posSetTableStatus
      summary: Manually set table status (waiter status flips).
      description: |
        Allowed transitions:
        `available → reserved | occupied | out_of_service`
        `reserved  → occupied | available`
        `occupied  → needs_cleaning | available`
        `needs_cleaning → available | out_of_service`
        `out_of_service → available`

        Returns `409 invalid_transition` for anything else.
      security:
        - staffAuth: []
      parameters:
        - $ref: '#/components/parameters/RestaurantIdPath'
        - $ref: '#/components/parameters/TableIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - available
                    - reserved
                    - occupied
                    - needs_cleaning
                    - out_of_service
                partySize:
                  type: integer
                  minimum: 1
                  description: Required when transitioning to `occupied` without an active reservation.
                note:
                  type: string
                  maxLength: 240
      responses:
        '200':
          description: New table state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Table'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Invalid transition.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                invalid:
                  value:
                    type: https://errors.catchtable.example/conflict
                    title: Invalid transition
                    status: 409
                    code: invalid_transition
                    detail: cannot go from `out_of_service` to `occupied`
  /pos/restaurants/{restaurantId}/tables/{tableId}/qr-code:rotate:
    post:
      tags:
        - POS · Tables
      operationId: posRotateTableQr
      summary: Rotate the QR code for a table.
      description: |
        Increments `qrCode.rotationVersion` and re-issues `payload`/`payloadHash`.  Existing
        QR scans for the previous version will receive `409 qr_rotated` from the
        reservation check-in endpoint.
      security:
        - staffAuth: []
      parameters:
        - $ref: '#/components/parameters/RestaurantIdPath'
        - $ref: '#/components/parameters/TableIdPath'
