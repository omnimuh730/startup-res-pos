# Security schemes are inlined here (instead of $ref'd from common.yaml) so that
# in-editor previewers like VS Code's Swagger Preview — which do not follow
# cross-file $refs — still render the Authorize button correctly.
#
# Everything else (parameters, headers, error responses, schemas) lives in
# `components/common.yaml` and `components/schemas.yaml` and is referenced via
# $ref from the path files. To preview without a bundler, use Redocly Preview
# (see README.md) or open the bundled artifact `openapi.bundled.yaml`.
components:
  securitySchemes:
    customerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT issued by `/auth/customer/sign-in` or `/auth/refresh`.
        Required claims: `sub` (customer userId), `subjectKind="customer"`, `exp`.
    staffAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT issued by `/auth/staff/sign-in` or `/auth/refresh`.
        Required claims: `sub` (staff userId), `subjectKind="staff"`, `restaurantId`,
        `role` (`manager`/`waiter`/`chef`/`cashier`), `permissions[]`, `exp`.
        POS endpoints under `/pos/restaurants/{restaurantId}/...` enforce that the
        token's `restaurantId` claim equals the path parameter.
    publicAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Optional bearer token. Endpoints accepting `publicAuth` work anonymously and
        also personalize results when a `customerAuth` token is supplied.
