  /restaurants/{restaurantId}:             { get: { $ref: './paths/discovery.yaml#/x-operations/GetPublicRestaurant' } }
  /restaurants/{restaurantId}/menu:        { get: { $ref: './paths/discovery.yaml#/x-operations/GetPublicMenu' } }
