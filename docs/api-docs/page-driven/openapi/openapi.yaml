  /pos/restaurants/{restaurantId}/analytics/sales-dashboard: { get: { $ref: './paths/pos-analytics.yaml#/x-operations/GetSalesDashboard' } }
  /pos/restaurants/{restaurantId}/analytics/revenue:         { get: { $ref: './paths/pos-analytics.yaml#/x-operations/GetRevenueAnalysis' } }
