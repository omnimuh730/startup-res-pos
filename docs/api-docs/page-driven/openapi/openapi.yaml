openapi: 3.1.0
info:
  title: CatchTable Page-Driven API
  version: 1.0.0
  summary: HTTP API for the CatchTable POS and reservation app.
  description: |
    Endpoints derived from the page-driven READMEs in `api-docs/page-driven/` and the
    13-collection MongoDB schema in `api-docs/page-driven/schema/`.

    See the `README.md` next to this file for conventions (auth, errors, pagination,
    idempotency) and how to bundle/preview the multi-file spec.
  license:
    name: Proprietary
  contact:
    name: CatchTable Engineering
    email: api@catchtable.example

servers:
  - url: https://api.catchtable.example/v1
    description: Production
  - url: https://api.staging.catchtable.example/v1
    description: Staging
  - url: http://localhost:8080/v1
    description: Local development

tags:
  # ------ customer-facing ------
  - name: Auth
    description: Sign in, sign up, refresh, sign out, password reset (customer + staff).
  - name: Metadata
    description: Read-only catalogs (security questions, plans, tiers, amenities, ...).
  - name: Customer · Profile
    description: Current customer (`/me`), preferences, security answers, devices, payment methods.
  - name: Customer · Social
    description: Saved items, recent searches, friends, daily bonus, referral.
  - name: Customer · Wallets
    description: Wallet balances, top-ups, gifts, transactions.
  - name: Customer · Rewards
    description: Reward tier, points, points ledger.
  - name: Customer · Notifications
    description: In-app notification feed.
  - name: Customer · Support
    description: Support conversations and messages.
  - name: Customer · Subscription
    description: CatchTable Pro subscription.
  - name: Discovery
    description: Discover home, explorer search/map, public restaurant/menu/availability.
  - name: Reservations
    description: Reservation lifecycle (customer-side and POS-side share most resources).
  # ------ POS-facing ------
  - name: POS · Restaurant
    description: Restaurant settings, phones, deposit cards, staff, floors, menu.
  - name: POS · Tables
    description: Tables CRUD, QR rotation, status flips.
  - name: POS · Orders
    description: POS orders, items, send-batches, bills, payments.
  - name: POS · Kitchen
    description: Kitchen view (chef batches), accept / complete / recall.
  - name: POS · Payments
    description: Payment queries and refunds.
  - name: POS · Analytics
    description: Sales dashboard, revenue, menu, customers, history.
  - name: POS · Subscription
    description: Restaurant tier subscription.

# Default security: customer JWT. Endpoints override as needed.
security:
  - customerAuth: []

# ----------- All paths -----------
# Each entry refs an operation defined in `paths/*.yaml`.
paths:

  # ============ Auth ============
  /auth/customer/sign-up:                  { post: { $ref: './paths/auth.yaml#/x-operations/CustomerSignUp' } }
  /auth/customer/sign-in:                  { post: { $ref: './paths/auth.yaml#/x-operations/CustomerSignIn' } }
  /auth/staff/sign-up/restaurant:          { post: { $ref: './paths/auth.yaml#/x-operations/StaffSignUpRestaurant' } }
  /auth/staff/sign-up/staff:               { post: { $ref: './paths/auth.yaml#/x-operations/StaffSignUpStaff' } }
  /auth/staff/sign-in:                     { post: { $ref: './paths/auth.yaml#/x-operations/StaffSignIn' } }
  /auth/sign-out:                          { post: { $ref: './paths/auth.yaml#/x-operations/SignOut' } }
  /auth/refresh:                           { post: { $ref: './paths/auth.yaml#/x-operations/Refresh' } }
  /auth/password-reset/start:              { post: { $ref: './paths/auth.yaml#/x-operations/PasswordResetStart' } }
  /auth/password-reset/verify-question:    { post: { $ref: './paths/auth.yaml#/x-operations/PasswordResetVerifyQuestion' } }
  /auth/password-reset/complete:           { post: { $ref: './paths/auth.yaml#/x-operations/PasswordResetComplete' } }
  /auth/username-available:                { get:  { $ref: './paths/auth.yaml#/x-operations/UsernameAvailable' } }

  # ============ Metadata ============
  /metadata/{catalog}:                     { get:  { $ref: './paths/metadata.yaml#/x-operations/GetCatalog' } }

  # ============ Customer · Profile ============
  /me:                                     { get: { $ref: './paths/customer-profile.yaml#/x-operations/GetMe' }, patch: { $ref: './paths/customer-profile.yaml#/x-operations/UpdateMe' } }
  /me/preferences:                         { put:  { $ref: './paths/customer-profile.yaml#/x-operations/PutPreferences' } }
  /me/security-answers:                    { put:  { $ref: './paths/customer-profile.yaml#/x-operations/PutSecurityAnswers' } }
  /me/password:                            { put:  { $ref: './paths/customer-profile.yaml#/x-operations/ChangePassword' } }
  /me/devices:                             { get: { $ref: './paths/customer-profile.yaml#/x-operations/ListDevices' }, post: { $ref: './paths/customer-profile.yaml#/x-operations/RegisterDevice' } }
  /me/devices/{deviceId}:                  { delete: { $ref: './paths/customer-profile.yaml#/x-operations/DeleteDevice' } }
  /me/payment-methods:                     { get: { $ref: './paths/customer-profile.yaml#/x-operations/ListPaymentMethods' }, post: { $ref: './paths/customer-profile.yaml#/x-operations/AddPaymentMethod' } }
  /me/payment-methods/{methodId}:          { patch: { $ref: './paths/customer-profile.yaml#/x-operations/UpdatePaymentMethod' }, delete: { $ref: './paths/customer-profile.yaml#/x-operations/DeletePaymentMethod' } }

  # ============ Customer · Social ============
  /me/saved-items:                         { get: { $ref: './paths/customer-social.yaml#/x-operations/ListSavedItems' }, post: { $ref: './paths/customer-social.yaml#/x-operations/AddSavedItem' } }
  /me/saved-items/{savedItemId}:           { delete: { $ref: './paths/customer-social.yaml#/x-operations/DeleteSavedItem' } }
  /me/recent-searches:                     { get: { $ref: './paths/customer-social.yaml#/x-operations/ListRecentSearches' }, post: { $ref: './paths/customer-social.yaml#/x-operations/PushRecentSearch' }, delete: { $ref: './paths/customer-social.yaml#/x-operations/ClearRecentSearches' } }
  /me/friends:                             { get:  { $ref: './paths/customer-social.yaml#/x-operations/ListFriends' } }
  /me/friends/{friendId}:                  { delete: { $ref: './paths/customer-social.yaml#/x-operations/RemoveFriend' } }
  /me/friend-requests:                     { get: { $ref: './paths/customer-social.yaml#/x-operations/ListFriendRequests' }, post: { $ref: './paths/customer-social.yaml#/x-operations/SendFriendRequest' } }
  /me/friend-requests/{requestId}:accept:  { post: { $ref: './paths/customer-social.yaml#/x-operations/AcceptFriendRequest' } }
  /me/friend-requests/{requestId}:decline: { post: { $ref: './paths/customer-social.yaml#/x-operations/DeclineFriendRequest' } }
  /me/friend-invites/by-phone:             { post: { $ref: './paths/customer-social.yaml#/x-operations/InviteFriendByPhone' } }
  /me/daily-bonus:                         { get:  { $ref: './paths/customer-social.yaml#/x-operations/GetDailyBonus' } }
  /me/daily-bonus:claim:                   { post: { $ref: './paths/customer-social.yaml#/x-operations/ClaimDailyBonus' } }
  /me/referral:                            { get:  { $ref: './paths/customer-social.yaml#/x-operations/GetReferral' } }
  /me/referral:redeem:                     { post: { $ref: './paths/customer-social.yaml#/x-operations/RedeemReferralCode' } }

  # ============ Customer · Wallets ============
  /me/wallets:                             { get:  { $ref: './paths/customer-wallets.yaml#/x-operations/GetWallets' } }
  /me/wallets/transactions:                { get:  { $ref: './paths/customer-wallets.yaml#/x-operations/ListWalletTransactions' } }
  /me/wallets/{pool}/top-up:               { post: { $ref: './paths/customer-wallets.yaml#/x-operations/StartTopUp' } }
  /me/wallets/top-ups/{topUpId}:           { get:  { $ref: './paths/customer-wallets.yaml#/x-operations/GetTopUp' } }
  /me/wallets/top-ups/{topUpId}:cancel:    { post: { $ref: './paths/customer-wallets.yaml#/x-operations/CancelTopUp' } }
  /me/wallets/{pool}/gift:                 { post: { $ref: './paths/customer-wallets.yaml#/x-operations/SendGift' } }

  # ============ Customer · Rewards ============
  /me/rewards:                             { get: { $ref: './paths/customer-rewards.yaml#/x-operations/GetRewards' } }
  /me/rewards/points-ledger:               { get: { $ref: './paths/customer-rewards.yaml#/x-operations/ListPointsLedger' } }

  # ============ Customer · Notifications ============
  /me/notifications:                       { get: { $ref: './paths/customer-notifications.yaml#/x-operations/ListNotifications' }, delete: { $ref: './paths/customer-notifications.yaml#/x-operations/DeleteAllNotifications' } }
  /me/notifications:mark-all-read:         { post:   { $ref: './paths/customer-notifications.yaml#/x-operations/MarkAllRead' } }
  /me/notifications/{notificationId}:      { delete: { $ref: './paths/customer-notifications.yaml#/x-operations/DeleteNotification' } }
  /me/notifications/{notificationId}:read: { post:   { $ref: './paths/customer-notifications.yaml#/x-operations/MarkOneRead' } }

  # ============ Customer · Support ============
  /me/support/conversations:                                  { get: { $ref: './paths/customer-support.yaml#/x-operations/ListConversations' }, post: { $ref: './paths/customer-support.yaml#/x-operations/OpenConversation' } }
  /me/support/conversations/{conversationId}:                 { get: { $ref: './paths/customer-support.yaml#/x-operations/GetConversation' } }
  /me/support/conversations/{conversationId}/messages:        { post: { $ref: './paths/customer-support.yaml#/x-operations/PostMessage' } }
  /me/support/conversations/{conversationId}:mark-read:       { post: { $ref: './paths/customer-support.yaml#/x-operations/MarkConversationRead' } }
  /me/support/conversations/{conversationId}:rate:            { post: { $ref: './paths/customer-support.yaml#/x-operations/RateConversation' } }

  # ============ Customer · Subscription ============
