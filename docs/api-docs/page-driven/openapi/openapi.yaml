  /me/subscription:cancel:                              { post: { $ref: './paths/customer-subscriptions.yaml#/x-operations/CancelMySubscription' } }
  /me/subscription:reactivate:                          { post: { $ref: './paths/customer-subscriptions.yaml#/x-operations/ReactivateMySubscription' } }
  /me/subscription:change-plan:                         { post: { $ref: './paths/customer-subscriptions.yaml#/x-operations/ChangePlan' } }
