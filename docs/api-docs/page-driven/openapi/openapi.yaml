  /pos/restaurants/{restaurantId}/staff/{staffId}:inactivate: { post: { $ref: './paths/pos-restaurant.yaml#/x-operations/InactivateStaff' } }
  /pos/restaurants/{restaurantId}/staff/{staffId}:activate:   { post: { $ref: './paths/pos-restaurant.yaml#/x-operations/ActivateStaff' } }
  /pos/restaurants/{restaurantId}/staff/pending:          { get: { $ref: './paths/pos-restaurant.yaml#/x-operations/ListPendingStaff' } }
