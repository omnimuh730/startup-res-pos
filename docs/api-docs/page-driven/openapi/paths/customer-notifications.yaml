openapi: 3.1.0
info:
  title: 'CatchTable Page-Driven — Customer Notifications'
  version: 1.0.0
  description: |
    Standalone OpenAPI 3.1 document for the `customer-notifications` path module.

    Operations live under `x-operations` (a spec-compliant extension key) so that:
      * the root `openapi.yaml` can $ref each one via `paths/customer-notifications.yaml#/x-operations/<OpName>`; and
      * editors that do not follow cross-file `$ref`s (Swagger Preview, Postman import,
        Stoplight, ...) can still parse and render this single file in isolation.

    Cross-file refs into `../components/*.yaml` will appear unresolved when this file
    is opened standalone. To see the full spec resolved, open `openapi.bundled.yaml`
    or run `redocly preview-docs` on the root `openapi.yaml`.
paths:
  /me/notifications:
    delete: { $ref: '#/x-operations/DeleteAllNotifications' }
    get: { $ref: '#/x-operations/ListNotifications' }
  /me/notifications:mark-all-read:
    post: { $ref: '#/x-operations/MarkAllRead' }
  /me/notifications/{notificationId}:
    delete: { $ref: '#/x-operations/DeleteNotification' }
  /me/notifications/{notificationId}:read:
    post: { $ref: '#/x-operations/MarkOneRead' }

x-operations:
  # In-app notification feed.

  ListNotifications:
    tags: [Customer · Notifications]
    operationId: listNotifications
    summary: List notifications (cursor pagination).
    description: |
      The Notifications page tabs map to `tab` query values:
        * `all`        — every undeleted notification
        * `unread`     — `read=false` only
        * `reservation`— `type` starts with `reservation.`
        * `system`     — `type` starts with `system.`
    parameters:
      - name: tab
        in: query
        schema: { type: string, enum: [all, unread, reservation, system], default: all }
      - $ref: '../components/common.yaml#/components/parameters/CursorQuery'
      - $ref: '../components/common.yaml#/components/parameters/LimitQuery'
    responses:
      '200':
        description: Notifications.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/common.yaml#/components/schemas/CursorPage'
                - type: object
                  properties:
                    unreadCount: { type: integer, minimum: 0, description: 'Total unread across all tabs.' }
                    data:
                      type: array
                      items: { $ref: '../components/schemas.yaml#/components/schemas/Notification' }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthenticated' }

  DeleteAllNotifications:
    tags: [Customer · Notifications]
    operationId: deleteAllNotifications
    summary: Soft-delete every notification for the user.
    description: |
      Sets `deletedAt` on all undeleted notifications.
    responses:
      '204': { $ref: '../components/common.yaml#/components/responses/NoContent' }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthenticated' }

  MarkAllRead:
    tags: [Customer · Notifications]
    operationId: markAllNotificationsRead
    summary: Mark every notification as read.
    parameters:
      - $ref: '../components/common.yaml#/components/parameters/IdempotencyKeyHeader'
    responses:
      '200':
        description: Counts updated.
        content:
          application/json:
            schema:
              type: object
              properties:
                affected:    { type: integer, minimum: 0 }
                unreadCount: { type: integer, enum: [0] }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthenticated' }

  MarkOneRead:
    tags: [Customer · Notifications]
    operationId: markNotificationRead
    summary: Mark a single notification as read. Idempotent.
    parameters:
      - $ref: '../components/common.yaml#/components/parameters/NotificationIdPath'
    responses:
      '200':
        description: Notification.
        content:
          application/json:
            schema: { $ref: '../components/schemas.yaml#/components/schemas/Notification' }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../components/common.yaml#/components/responses/NotFound' }

  DeleteNotification:
    tags: [Customer · Notifications]
    operationId: deleteNotification
    summary: Soft-delete a single notification. Idempotent.
    parameters:
      - $ref: '../components/common.yaml#/components/parameters/NotificationIdPath'
    responses:
      '204': { $ref: '../components/common.yaml#/components/responses/NoContent' }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../components/common.yaml#/components/responses/NotFound' }
