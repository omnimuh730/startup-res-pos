openapi: 3.1.0
info:
  title: Auth & Session API (POS + Reservation Tenants)
  version: 1.1.0
  summary: Tenantized auth/session contract for POS and Reservation systems.
  description: |
    URL pattern is tenantized under /{version}/{tenant}/... where applicable.
    Identity is username-only across both tenants (no email-based auth fields).
    Access/refresh tokens are issued and rotated only by these auth/session endpoints.
servers:
  - url: https://api.internal/{version}
    description: On-prem gateway
    variables:
      version:
        default: v1
        enum: [v1]
tags:
  - name: POS Auth
  - name: Reservation Auth
  - name: Tenant Sessions
paths:
  /pos/auth/login:
    post:
      tags: [POS Auth]
      summary: POS staff sign in
      operationId: posStaffSignIn
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PosStaffSignInRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
  /pos/auth/restaurant/signup:
    post:
      tags: [POS Auth]
      summary: POS restaurant sign up
      operationId: posRestaurantSignUp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PosRestaurantSignUpRequest' }
      responses:
        '201':
          description: Restaurant + admin created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PosRestaurantSignUpResponse' }
        '400': { $ref: '#/components/responses/BadRequestError' }
  /pos/auth/restaurants:
    get:
      tags: [POS Auth]
      summary: List registered restaurants for staff signup selector
      operationId: posListRestaurants
      security: []
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: Restaurant list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RestaurantListResponse' }
  /pos/auth/staff/signup:
    post:
      tags: [POS Auth]
      summary: POS staff sign up under selected restaurant
      operationId: posStaffSignUp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PosStaffSignUpRequest' }
      responses:
        '201':
          description: Staff account created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PosStaffSignUpResponse' }
        '404': { $ref: '#/components/responses/NotFoundError' }
  /reservation/auth/login:
    post:
      tags: [Reservation Auth]
      summary: Reservation sign in
      operationId: reservationSignIn
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReservationSignInRequest' }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSuccessResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
  /reservation/auth/recovery-questions:
    get:
      tags: [Reservation Auth]
      summary: List static recovery question options
      operationId: reservationListRecoveryQuestions
      security: []
      responses:
        '200':
          description: Question options
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecoveryQuestionListResponse' }
  /reservation/auth/signup:
    post:
      tags: [Reservation Auth]
      summary: Reservation signup with referral + recovery Q&A
      operationId: reservationSignUp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReservationSignUpRequest' }
      responses:
        '201':
          description: Account created and auto logged in
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSuccessResponse' }
        '400': { $ref: '#/components/responses/BadRequestError' }
  /reservation/auth/password-recovery/find-account:
    post:
      tags: [Reservation Auth]
      summary: Password recovery step 1 (find account)
      operationId: reservationFindAccountForRecovery
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username: { type: string }
      responses:
        '200':
          description: Recovery session started
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecoverySessionResponse' }
  /reservation/auth/password-recovery/verify:
    post:
      tags: [Reservation Auth]
      summary: Password recovery step 2 (verify answer)
      operationId: reservationVerifyRecoveryAnswer
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recovery_session_id, question_id, answer]
              properties:
                recovery_session_id: { type: string }
                question_id: { type: string }
                answer: { type: string }
      responses:
        '200':
          description: Answer accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecoverySessionResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
  /reservation/auth/password-recovery/reset:
    post:
      tags: [Reservation Auth]
      summary: Password recovery step 3 (set new password)
      operationId: reservationResetPasswordViaRecovery
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recovery_session_id, new_password]
              properties:
                recovery_session_id: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        '204': { description: Password reset completed }
        '400': { $ref: '#/components/responses/BadRequestError' }
  /{tenant}/auth/refresh:
    post:
      tags: [Tenant Sessions]
      summary: Refresh access token (tenant-aware)
      operationId: tenantRefresh
      security: []
      parameters:
        - $ref: '#/components/parameters/TenantParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSuccessResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
  /{tenant}/auth/logout:
    post:
      tags: [Tenant Sessions]
      summary: Logout current tenant session
      operationId: tenantLogout
      parameters:
        - $ref: '#/components/parameters/TenantParam'
      responses:
        '204': { description: Session revoked }
  /{tenant}/auth/logout-all:
    post:
      tags: [Tenant Sessions]
      summary: Logout all tenant sessions
      operationId: tenantLogoutAll
      parameters:
        - $ref: '#/components/parameters/TenantParam'
      responses:
        '204': { description: All sessions revoked }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantParam:
      in: path
      name: tenant
      required: true
      schema:
        type: string
        enum: [pos, reservation]
  responses:
    BadRequestError:
      description: Request validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    UnauthorizedError:
      description: Authentication failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFoundError:
      description: Entity not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    Meta:
      type: object
      required: [request_id]
      properties:
        request_id: { type: string }
    ErrorBody:
      type: object
      required: [code, message, retryable]
      properties:
        code: { type: string }
        message: { type: string }
        details:
          type: object
          additionalProperties: true
        retryable: { type: boolean }
    ErrorResponse:
      type: object
      required: [error, meta]
      properties:
        error: { $ref: '#/components/schemas/ErrorBody' }
        meta: { $ref: '#/components/schemas/Meta' }
    Principal:
      type: object
      required: [id, type]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [staff, user]
    AuthSuccessData:
      type: object
      required: [access_token, refresh_token, principal]
      properties:
        access_token: { type: string }
        access_token_expires_at: { type: string, format: date-time }
        refresh_token: { type: string }
        principal: { $ref: '#/components/schemas/Principal' }
    AuthSuccessResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/AuthSuccessData' }
        meta: { $ref: '#/components/schemas/Meta' }
    PosStaffSignInRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    PosRestaurantSignUpRequest:
      type: object
      required: [restaurant_name, admin_name, username, password]
      properties:
        restaurant_name: { type: string }
        admin_name: { type: string }
        username: { type: string }
        password: { type: string }
    PosRestaurantSignUpResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [restaurant_id]
          properties:
            restaurant_id: { type: string }
            access_token: { type: string }
            refresh_token: { type: string }
        meta: { $ref: '#/components/schemas/Meta' }
    PosStaffSignUpRequest:
      type: object
      required: [restaurant_id, full_name, username, password]
      properties:
        restaurant_id: { type: string }
        full_name: { type: string }
        username: { type: string }
        password: { type: string }
    PosStaffSignUpResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [staff_id]
          properties:
            staff_id: { type: string }
        meta: { $ref: '#/components/schemas/Meta' }
    ReservationSignInRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    ReservationRecoveryQA:
      type: object
      required: [question_id, answer]
      properties:
        question_id: { type: string }
        answer: { type: string }
    ReservationSignUpRequest:
      type: object
      required: [username, password, full_name, recovery_questions]
      properties:
        referral_code: { type: string }
        username: { type: string }
        password: { type: string }
        full_name: { type: string }
        recovery_questions:
          type: array
          minItems: 3
          maxItems: 3
          items: { $ref: '#/components/schemas/ReservationRecoveryQA' }
    RestaurantSummary:
      type: object
      required: [id, name]
      properties:
        id: { type: string }
        name: { type: string }
    RestaurantListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/RestaurantSummary' }
        meta: { $ref: '#/components/schemas/Meta' }
    RecoveryQuestion:
      type: object
      required: [id, label]
      properties:
        id: { type: string }
        label: { type: string }
    RecoveryQuestionListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/RecoveryQuestion' }
        meta: { $ref: '#/components/schemas/Meta' }
    RecoverySessionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [recovery_session_id]
          properties:
            recovery_session_id: { type: string }
        meta: { $ref: '#/components/schemas/Meta' }
